name: CI

# Runs on every push/PR to main, plus a manual "Run workflow" button.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------
  # Dependency check #1: pip-audit (fast, no external API key needed)
  # ---------------------------------------------------------------------
  pip-audit:
    name: Dependency Check (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit against requirements.txt
        run: pip-audit -r requirements.txt -f json -o pip-audit-report.json

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # ---------------------------------------------------------------------
  # Dependency check #2: OWASP Dependency-Check (full SCA scan/report)
  #
  # Optional but strongly recommended: add an NVD API key as a repo
  # secret named NVD_API_KEY (free key: https://nvd.nist.gov/developers/request-an-api-key)
  # Settings > Secrets and variables > Actions > New repository secret.
  # Without it the scan still runs, just slower / more likely to be
  # rate-limited on the first NVD database sync.
  # ---------------------------------------------------------------------
  owasp-dependency-check:
    name: Dependency Check (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "search-webapp"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --failOnCVSS 7
            --enableRetired
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports

  # ---------------------------------------------------------------------
  # Integration tests: bring the full docker-compose stack (web + db) up
  # and exercise it over HTTP with real requests.
  # ---------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done
          echo "App did not become ready in time" >&2
          docker compose logs
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        run: pytest tests/test_integration.py -v

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------
  # UI tests: drive a real headless browser against the app over HTTP.
  # ---------------------------------------------------------------------
  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app... ($i)"
            sleep 2
          done
          echo "App did not become ready in time" >&2
          docker compose logs
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run UI tests
        run: pytest tests/test_ui.py -v

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
