version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: search_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: searchdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d searchdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # This "web" container serves the Flask app directly via gunicorn and
  # is exposed on the host port itself - it stands in for the nginx
  # container that would otherwise front the app.
  web:
    build: .
    container_name: search_web
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: searchdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      FLASK_SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  db_data:
